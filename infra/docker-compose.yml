version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - ../.env.production

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - ../.env.production

  worker:
    build:
      context: ../backend
      dockerfile: ../worker/Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ../.env.production

  beat:
    build:
      context: ../backend
      dockerfile: ../worker/Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    env_file:
      - ../.env.production

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-simulator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-simulator}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  pg_backup:
    image: alpine:3.18
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-simulator}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET_NAME: postgres-backups
    command: >
      sh -c "
        apk add --no-cache postgresql-client aws-cli;
        echo 'Ensuring backup bucket postgres-backups exists...';
        # Configure AWS CLI for MinIO
        aws configure set aws_access_key_id $$MINIO_ACCESS_KEY;
        aws configure set aws_secret_access_key $$MINIO_SECRET_KEY;
        aws configure set default.region us-east-1;
        # Wait for minio to fully settle
        sleep 10;
        aws --endpoint-url $$MINIO_ENDPOINT s3 mb s3://$$BUCKET_NAME || true;
        echo 'Starting daily backup schedule loop...';
        while true; do
          echo 'Creating database backup...';
          FILENAME=pg_backup_$$(date +%F_%T).sql;
          PGPASSWORD=$$PGPASSWORD pg_dump -h $$PGHOST -U $$PGUSER -d $$PGDATABASE > /tmp/$$FILENAME;
          echo 'Uploading backup to MinIO bucket...';
          aws --endpoint-url $$MINIO_ENDPOINT s3 cp /tmp/$$FILENAME s3://$$BUCKET_NAME/$$FILENAME;
          rm /tmp/$$FILENAME;
          echo 'Backup complete. Next backup in 24 hours.';
          sleep 86400;
        done
      "

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
