apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: aabs
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.auth.rootPassword | b64enc | quote }}
  SENTRY_DSN: {{ .Values.sentry.dsn | b64enc | quote }}
  SENTRY_AUTH_TOKEN: {{ .Values.sentry.authToken | b64enc | quote }}
  # Construct DB URL dynamically for injection
  DATABASE_URL: {{ printf "postgresql+psycopg2://%s:%s@%s-postgres:5432/%s" .Values.postgres.auth.username .Values.postgres.auth.password .Release.Name .Values.postgres.auth.database | b64enc | quote }}
