apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: aabs
    tier: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: aabs
      tier: worker
  template:
    metadata:
      labels:
        app: aabs
        tier: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
        command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: DATABASE_URL
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SENTRY_DSN
        - name: SENTRY_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SENTRY_AUTH_TOKEN
        resources:
          {{- toYaml .Values.worker.resources | nindent 10 }}
        # Liveness check using Celery command line ping
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - app.celery_app
            - inspect
            - ping
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 15
