apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app: aabs
    tier: db
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aabs
      tier: db
  template:
    metadata:
      labels:
        app: aabs
        tier: db
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        ports:
        - containerPort: 5432
          name: dbport
        env:
        - name: POSTGRES_DB
          value: "{{ .Values.postgres.auth.database }}"
        - name: POSTGRES_USER
          value: "{{ .Values.postgres.auth.username }}"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: POSTGRES_PASSWORD
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - "{{ .Values.postgres.auth.username }}"
            - -d
            - "{{ .Values.postgres.auth.database }}"
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - "{{ .Values.postgres.auth.username }}"
            - -d
            - "{{ .Values.postgres.auth.database }}"
          initialDelaySeconds: 5
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.postgres.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app: aabs
    tier: db
spec:
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: dbport
  selector:
    app: aabs
    tier: db
