apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-beat
  labels:
    app: aabs
    tier: beat
spec:
  replicas: {{ .Values.beat.replicaCount }}
  selector:
    matchLabels:
      app: aabs
      tier: beat
  template:
    metadata:
      labels:
        app: aabs
        tier: beat
    spec:
      containers:
      - name: beat
        image: "{{ .Values.beat.image.repository }}:{{ .Values.beat.image.tag }}"
        imagePullPolicy: {{ .Values.beat.image.pullPolicy }}
        command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: DATABASE_URL
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SENTRY_DSN
        - name: SENTRY_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SENTRY_AUTH_TOKEN
        resources:
          {{- toYaml .Values.beat.resources | nindent 10 }}
        # Celery beat is single replica only to avoid duplicate scheduling, so we just run a basic process check if needed, or simply monitor container exit.
