server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: aabs-containers
  static_configs:
  - targets:
      - localhost
    labels:
      job: aabs-logs
      __path__: /var/lib/docker/containers/*/*.log
  pipeline_stages:
  - json:
      expressions:
        output: log
        stream: stream
        time: time
  - json:
      expressions:
        trace_id: trace_id
        org_id: org_id
        user_id: user_id
        simulation_id: simulation_id
        duration_ms: duration_ms
        status_code: status_code
        message: message
        levelname: levelname
      source: output
  - labels:
      trace_id:
      org_id:
      user_id:
      simulation_id:
      status_code:
      levelname:
