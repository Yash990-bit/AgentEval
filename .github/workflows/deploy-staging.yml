name: Deploy to Staging

on:
  workflow_dispatch:


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_HOST || 'docker.io' }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend:staging
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend:staging
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Worker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./worker/Dockerfile
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker:staging
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Kubeconfig
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy Staging Release via Helm
      run: |
        helm upgrade --install aabs-staging ./k8s/helm/aabs \
          --namespace staging \
          --create-namespace \
          --set backend.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend" \
          --set backend.image.tag="${{ github.sha }}" \
          --set frontend.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend" \
          --set frontend.image.tag="${{ github.sha }}" \
          --set worker.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker" \
          --set worker.image.tag="${{ github.sha }}" \
          --set beat.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker" \
          --set beat.image.tag="${{ github.sha }}" \
          --set environment="staging" \
          --set domain="staging.aabs.local" \
          --set sentry.dsn="${{ secrets.SENTRY_DSN }}"
