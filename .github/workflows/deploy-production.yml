name: Deploy to Production

on:
  release:
    types: [published]

jobs:
  build-and-push-prod:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_HOST || 'docker.io' }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Extract Tag Name
      id: extract_tag
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend:${{ steps.extract_tag.outputs.TAG_NAME }}
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend:${{ steps.extract_tag.outputs.TAG_NAME }}
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Worker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./worker/Dockerfile
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker:${{ steps.extract_tag.outputs.TAG_NAME }}
          ${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-production:
    needs: build-and-push-prod
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://aabs.yourdomain.com
    steps:
    - uses: actions/checkout@v3

    - name: Extract Tag Name
      id: extract_tag
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Set up Kubeconfig
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy Production Release via Helm
      run: |
        helm upgrade --install aabs-prod ./k8s/helm/aabs \
          --namespace production \
          --create-namespace \
          --set backend.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-backend" \
          --set backend.image.tag="${{ steps.extract_tag.outputs.TAG_NAME }}" \
          --set frontend.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-frontend" \
          --set frontend.image.tag="${{ steps.extract_tag.outputs.TAG_NAME }}" \
          --set worker.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker" \
          --set worker.image.tag="${{ steps.extract_tag.outputs.TAG_NAME }}" \
          --set beat.image.repository="${{ secrets.REGISTRY_HOST || 'docker.io' }}/${{ secrets.REGISTRY_USERNAME }}/aabs-worker" \
          --set beat.image.tag="${{ steps.extract_tag.outputs.TAG_NAME }}" \
          --set environment="production" \
          --set domain="aabs.yourdomain.com" \
          --set sentry.dsn="${{ secrets.SENTRY_DSN }}"
